services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    image: comfyui:latest
    container_name: comfyui
    ports:
      - "8189:8189"
    volumes:
      # SDXL ComfyUI (C:\Users\jmkel\ComfyUI) — has Juggernaut-XL and concept art models
      - "C:\\Users\\jmkel\\ComfyUI\\models:/app/models"
      - "C:\\Users\\jmkel\\ComfyUI\\output:/app/output"
      - "C:\\Users\\jmkel\\ComfyUI\\input:/app/input"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped
