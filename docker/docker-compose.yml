services:

  # -----------------------------------------------------------------------
  # ComfyUI Trellis2 — all AI workflows (FLUX, ControlNet restyle, Trellis)
  # Port 8190 | Python 3.12 | PyTorch 2.8.0+cu128
  # -----------------------------------------------------------------------
  comfyui-trellis:
    build:
      context: ./comfyui-trellis
      dockerfile: Dockerfile
    image: comfyui-trellis:latest
    container_name: comfyui-trellis
    ports:
      - "8190:8190"
    volumes:
      - ${TRELLIS_MODELS_DIR:-./models/trellis}:/app/models
      - ${TRELLIS_OUTPUT_DIR:-./output/trellis}:/app/output
      - ${TRELLIS_INPUT_DIR:-./input/trellis}:/app/input
      - trellis-hf-cache:/home/comfy/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/home/comfy/.cache/huggingface
      - HF_HUB_CACHE=/home/comfy/.cache/huggingface/hub
    restart: unless-stopped

volumes:
  # Persists HuggingFace model cache (Trellis, DINOv2, BiRefNet etc.) across container restarts
  trellis-hf-cache:
